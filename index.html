<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Web</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrap">
    <h1>ข้อมูลจาก Apps Script API</h1>
    <p class="subtitle">ระบบใบสมัครงานออนไลน์ TOHOKU Manufacturing (Thailand) Co.,Ltd.</p>

    <div id="loading" class="state">
      <div class="spinner"></div>
      <p>กำลังโหลดข้อมูล...</p>
    </div>

    <div id="errorState" class="state error" style="display:none;">
      <p class="error-title">โหลดข้อมูลไม่สำเร็จ</p>
      <p id="errorDetail" class="error-detail"></p>
    </div>

    <div id="content" class="cards" style="display:none;"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
